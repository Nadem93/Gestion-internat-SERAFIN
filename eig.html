<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Registre EIG — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
.badge-incident { display:inline-flex;align-items:center;gap:.35rem;padding:.18rem .55rem;border-radius:100px;font-size:.7rem;font-weight:600;white-space:nowrap; }
.badge-incident.dangere { background:#fef2f2;color:#dc2626; }
.badge-incident.grave { background:#ffedd5;color:#c2410c; }
.badge-incident.moyen { background:#fefce8;color:#a16207; }
.badge-incident.leger { background:#f0fdf4;color:#16a34a; }
</style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">🚨 Registre des EIG</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm" onclick="printRegistreEig()">🖨 Registre annuel</button>
        <a href="incidents.html" class="btn btn-ghost btn-sm">← Incidents</a>
      </div>
    </header>

    <main class="content" style="max-width:980px">
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:1rem">Suivi des événements indésirables graves (EIG) déclarables à l'ARS — cadre réglementaire des établissements sociaux et médico-sociaux. Les événements sont marqués depuis le module <a href="incidents.html">Incidents</a>.</div>
      <div id="eStats" class="grid grid-4" style="margin-bottom:1.5rem"></div>
      <div id="eList"></div>
    </main>
  </div>
</div>

<!-- MODAL GESTION EIG -->
<div class="modal-overlay" id="modalEig">
  <div class="modal lg">
    <div class="modal-header">
      <span class="modal-title" id="emTitle">Déclaration EIG</span>
      <button class="modal-close" onclick="closeModal('modalEig')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Mesures immédiates prises</label><textarea id="emMesuresImmediates" rows="2" placeholder="Premiers gestes, mise en sécurité, soins…"></textarea></div>
      <div class="divider"></div>
      <div class="section-label">Déclaration</div>
      <div class="form-row">
        <div class="form-group"><label style="display:flex;align-items:center;gap:.4rem;font-weight:400"><input type="checkbox" id="emDeclareARS"/> Déclaré sur le portail des signalements (ARS)</label></div>
        <div class="form-group"><label>Date de déclaration</label><input type="date" id="emDateDeclaration"/></div>
      </div>
      <div class="form-group"><label>N° de signalement (portail)</label><input type="text" id="emNumero" placeholder="Référence du signalement"/></div>
      <div class="form-group"><label>Destinataires informés</label><div id="emDestinataires" style="display:flex;flex-direction:column;gap:.3rem;background:var(--g50);border:1px solid var(--border);border-radius:var(--r-sm);padding:.6rem .75rem"></div></div>
      <div class="divider"></div>
      <div class="section-label">Suivi & clôture</div>
      <div class="form-group"><label>Mesures correctives / actions de suivi</label><textarea id="emMesuresCorrectives" rows="2" placeholder="Actions mises en place pour éviter le renouvellement…"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label style="display:flex;align-items:center;gap:.4rem;font-weight:400"><input type="checkbox" id="emCloture"/> Dossier clôturé</label></div>
        <div class="form-group"><label>Date de clôture</label><input type="date" id="emDateCloture"/></div>
      </div>
      <div class="form-group"><label>Suites données</label><textarea id="emSuites" rows="2" placeholder="Retour ARS, suites disciplinaires, judiciaires…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalEig')">Annuler</button>
      <button class="btn btn-primary" onclick="saveEig()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/incidents.js"></script>
<script src="js/eig.js"></script>
</body>
</html>
