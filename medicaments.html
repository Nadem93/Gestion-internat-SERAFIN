<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Distribution des médicaments — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">💊 Distribution des médicaments</div></div>
      <div class="header-right">
        <input type="date" id="medDate" style="width:auto"/>
        <button class="btn btn-outline btn-sm" onclick="printMedSheet()">🖨 Feuille du jour</button>
        <a href="accueil.html" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    </header>

    <main class="content" style="max-width:1000px">
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:1rem">Traçabilité de la distribution des médicaments, à partir des traitements en cours et de leurs moments de prise renseignés sur la fiche de chaque résident.</div>
      <div id="medStats" class="grid grid-4" style="margin-bottom:1.5rem"></div>
      <div id="medList"></div>
    </main>
  </div>
</div>

<!-- MODAL OBSERVATION -->
<div class="modal-overlay" id="modalMedNote">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Observation</span>
      <button class="modal-close" onclick="closeModal('modalMedNote')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Note (motif de refus, remarque…)</label><textarea id="mnTexte" rows="3" placeholder="Ex : médicament refusé, résident absent, prise reportée au soir…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalMedNote')">Annuler</button>
      <button class="btn btn-primary" onclick="saveMedNote()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/medicaments.js"></script>
</body>
</html>
