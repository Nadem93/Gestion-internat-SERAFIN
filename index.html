<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>INTERNALIS — Connexion</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet"/>
  <style>
    body {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#b8b0d4 0%,#d4cfe8 45%,#f5f0fc 100%);
      background-attachment:fixed;
      padding:1.5rem;
    }
    .login-wrap {
      width:100%;
      max-width:400px;
      display:flex;
      flex-direction:column;
      gap:2rem;
    }
    .login-brand {
      text-align:center;
    }
    .login-brand-name {
      font-family:'Playfair Display',serif;
      font-size:2.4rem;
      font-weight:900;
      color:#1e40af;
      letter-spacing:.14em;
      text-transform:uppercase;
      line-height:1;
    }
    .login-brand-sub {
      font-size:.78rem;
      color:#64748b;
      margin-top:.5rem;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-weight:500;
    }
    .login-card {
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:20px;
      padding:2rem;
      box-shadow:0 8px 32px rgba(15,43,74,.12),0 2px 8px rgba(15,43,74,.06);
    }
    .login-card h2 {
      font-size:1.25rem;
      font-weight:800;
      color:#1e293b;
      margin-bottom:.3rem;
    }
    .login-card p {
      font-size:.85rem;
      color:#64748b;
      margin-bottom:1.75rem;
    }
    .login-footer {
      text-align:center;
      font-size:.72rem;
      color:#94a3b8;
    }
  </style>
</head>
<body>
  <div class="login-wrap fade-in">
    <!-- Marque INTERNALIS -->
    <div class="login-brand">
      <div class="login-brand-name">INTERNALIS</div>
      <div class="login-brand-sub">Plateforme de gestion médico-sociale</div>
    </div>

    <!-- Carte de connexion -->
    <div class="login-card">
      <h2>Bon retour 👋</h2>
      <p>Connectez-vous à votre espace</p>

      <form id="loginForm" style="display:flex;flex-direction:column;gap:1rem">
        <div class="form-group">
          <label for="login">Identifiant</label>
          <div class="input-with-icon">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <input type="text" id="login" placeholder="Votre identifiant" autocomplete="username"/>
          </div>
        </div>
        <div class="form-group">
          <label for="pw" style="display:flex;justify-content:space-between">
            Mot de passe
            <a href="#" style="font-weight:400;color:var(--blue);font-size:.78rem">Oublié ?</a>
          </label>
          <div class="input-with-icon">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/>
          </div>
        </div>
        <div class="checkbox-wrap">
          <input type="checkbox" id="remember"/>
          <label for="remember" style="font-size:.875rem;color:var(--muted);font-weight:400;cursor:pointer">Se souvenir de moi</label>
        </div>
        <div id="loginError" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:.75rem 1rem;border-radius:var(--r);font-size:.85rem">
          Identifiant ou mot de passe incorrect.
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.25rem">Se connecter</button>
      </form>
    </div>

    <div class="login-footer">© INTERNALIS · Tous droits réservés</div>
  </div>

  <script src="js/app.js"></script>
  <script>
    initDefaults();
    if (Auth.getSession()) window.location.href = 'app.html';
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const username = document.getElementById('login').value;
      const password = document.getElementById('pw').value;
      if (Auth.login(username, password)) {
        window.location.href = 'app.html';
      } else {
        document.getElementById('loginError').style.display = '';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    });
    ['login','pw'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('loginError').style.display = 'none';
      });
    });
  </script>
</body>
</html>
