<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Connexion — FTR</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,sans-serif;font-size:.938rem;color:#334155;
      background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;
    }
    input,button{border:none;outline:none;font-family:inherit;font-size:.938rem}

    .lc{width:100%;max-width:360px;display:flex;flex-direction:column;gap:2rem}
    .lc-brand{text-align:center}
    .lc-brand-name{font-size:1.6rem;font-weight:800;color:#e85d04;letter-spacing:-.02em}
    .lc-card{background:#fff;border-radius:12px;padding:2rem;box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);border:1.5px solid #0f2b4a}
    .lc-title{font-size:1rem;font-weight:700;color:#0f2b4a;margin-bottom:1.25rem;text-align:center}
    .lc-field{margin-bottom:.85rem}
    .lc-field label{display:block;font-size:.78rem;font-weight:600;color:#64748b;margin-bottom:.3rem}
    .lc-field input{
      width:100%;height:44px;padding:0 .85rem;border:1.5px solid #e2e8f0;border-radius:8px;
      background:#f8fafc;color:#0f2b4a;font-weight:500;transition:border-color .15s,box-shadow .15s
    }
    .lc-field input:focus{border-color:#0f2b4a;box-shadow:0 0 0 3px rgba(15,43,74,.1);background:#fff}
    .lc-btn{
      width:100%;height:44px;background:#0f2b4a;color:#fff;border-radius:8px;
      font-weight:600;font-size:.875rem;cursor:pointer;transition:background .15s,transform .1s;margin-top:.25rem
    }
    .lc-btn:hover{background:#1a4a7a}
    .lc-btn:active{transform:scale(.98)}
    .lc-error{
      display:none;margin-top:.75rem;padding:.6rem .85rem;border-radius:8px;
      background:#fef2f2;border:1px solid #fecaca;color:#dc2626;font-size:.8rem;text-align:center
    }
    .lc-footer{text-align:center;font-size:.72rem;color:#94a3b8}
    @media(width>=540px){.lc{max-width:380px}}
  </style>
</head>
<body>

<div class="lc">
  <div class="lc-brand"><div class="lc-brand-name">INTERNALIS</div></div>

  <div class="lc-card">
    <div class="lc-title">Connexion</div>
    <form id="loginForm">
      <div class="lc-field">
        <label for="login">Identifiant</label>
        <input type="text" id="login" placeholder="ex: admin" autocomplete="username"/>
      </div>
      <div class="lc-field">
        <label for="pw">Mot de passe</label>
        <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button type="submit" class="lc-btn">Se connecter</button>
      <div id="loginError" class="lc-error">Identifiant ou mot de passe incorrect.</div>
    </form>
  </div>

  <div class="lc-footer">© INTERNALIS</div>
</div>

<script src="js/app.js"></script>
<script>
  initDefaults();
  if (Auth.getSession()) window.location.href = 'app.html';

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const username = document.getElementById('login').value;
    const password = document.getElementById('pw').value;
    if (Auth.login(username, password)) {
      window.location.href = 'app.html';
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });

  ['login','pw'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('loginError').style.display = 'none';
    });
  });
</script>
</body>
</html>
