<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Connexion — Foyer Trois Rivières</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">
  <div class="login-card fade-in">
    <div class="login-logo">
      <div class="logo-icon" style="background:var(--accent)">FTR</div>
      <div class="logo-text">
        <span>Foyer</span>
        <strong>Trois Rivières</strong>
      </div>
    </div>
    <h2 style="font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:.4rem">Bon retour 👋</h2>
    <p style="font-size:.875rem;color:var(--muted);margin-bottom:2rem">Connectez-vous à votre espace administrateur</p>

    <form id="loginForm" style="display:flex;flex-direction:column;gap:1.1rem">
      <div class="form-group">
        <label for="login">Identifiant</label>
        <div class="input-with-icon">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="login" placeholder="Votre identifiant" autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label for="pw" style="display:flex;justify-content:space-between">
          Mot de passe
          <a href="#" style="font-weight:400;color:var(--blue);font-size:.78rem">Oublié ?</a>
        </label>
        <div class="input-with-icon" style="position:relative">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/>
        </div>
      </div>
      <div class="checkbox-wrap">
        <input type="checkbox" id="remember"/>
        <label for="remember" style="font-size:.875rem;color:var(--muted);font-weight:400;cursor:pointer">Se souvenir de moi</label>
      </div>
      <div id="loginError" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:.75rem 1rem;border-radius:var(--r);font-size:.875rem;margin-top:-.25rem">
        Identifiant ou mot de passe incorrect.
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:.5rem">Se connecter</button>
    </form>

    <p style="font-size:.75rem;color:var(--muted);text-align:center;margin-top:2rem">
      Plateforme de gestion — Foyer d'Hébergement Les Trois Rivières
    </p>
  </div>

  <script src="js/app.js"></script>
  <script>
    initDefaults();
    if (Auth.getSession()) window.location.href = 'dashboard.html';
    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const username = document.getElementById('login').value;
      const password = document.getElementById('pw').value;
      if (Auth.login(username, password)) {
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('loginError').style.display = '';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    });
    ['login','pw'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('loginError').style.display = 'none';
      });
    });
  </script>
</body>
</html>
