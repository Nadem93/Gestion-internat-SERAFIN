<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planning équipe — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">Planning équipe</div></div>
    <div class="header-right"><button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button></div>
  </header>
  <main class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div>
        <div style="font-weight:700;font-size:1rem">📅 Planning équipe</div>
        <div style="font-size:.78rem;color:var(--muted)">Import CSV — Vue par employé</div>
      </div>
      <button class="btn btn-outline btn-sm admin-only" onclick="openImportPlanning()">📥 Importer</button>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;gap:1rem;padding:.75rem 1rem;align-items:center">
        <div style="flex:1">
          <label style="font-size:.72rem;font-weight:700;color:var(--muted);display:block;margin-bottom:.25rem">Employé</label>
          <select id="peFiltreEmploye" class="form-input" style="max-width:280px" onchange="renderPlanningEquipe()"><option value="">Tous</option></select>
        </div>
        <div>
          <label style="font-size:.72rem;font-weight:700;color:var(--muted);display:block;margin-bottom:.25rem">Semaine</label>
          <input type="week" id="peSemaine" class="form-input" style="max-width:200px" onchange="renderPlanningEquipe()"/>
        </div>
      </div>
    </div>
    <div id="peInfo" class="card" style="margin-bottom:1rem;display:none">
      <div class="card-body" style="font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.5rem">
        <span>📁</span><span id="peInfoText"></span>
        <button class="btn btn-ghost btn-sm admin-only" style="margin-left:auto" onclick="openImportPlanning()">Mettre à jour</button>
      </div>
    </div>
    <div id="peTable" class="card"><div class="card-body" style="padding:0;overflow-x:auto">
      <div class="empty" style="padding:3rem;text-align:center">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;margin:0 auto .75rem;color:var(--g300)"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p>Aucun planning importé.</p>
      </div>
    </div></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/planning-equipe.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_planning_equipe')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
