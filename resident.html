<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fiche résident — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div><div class="header-title" id="pageTitle">Fiche résident</div><div class="header-sub" id="pageSub">Chargement…</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
        <button class="btn btn-accent btn-sm" id="btnEdit" onclick="togglePageEdit()">✎ Modifier</button>
      </div>
    </header>
    <main class="content" id="residentContent"></main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script src="js/residents.js"></script>
<script>
let currentResidentId = null;
let pageEditMode = false;

function getResident(id) {
  const residents = DB.get(DB.keys.residents) || [];
  return residents.find(x => x.id === (id || currentResidentId));
}

function canEditResident() {
  const session = Auth.getSession();
  return session && (session.role === 'admin' || session.role === 'moderator');
}

function loadResident() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { document.getElementById('residentContent').innerHTML = '<div class="empty"><h3>Résident non trouvé</h3><p>Aucun ID fourni.</p><a href="residents.html" class="btn btn-accent">← Retour aux résidents</a></div>'; return; }

  currentResidentId = id;

  const r = getResident();
  if (!r) { document.getElementById('residentContent').innerHTML = '<div class="empty"><h3>Résident introuvable</h3><p>Ce résident n\'existe pas ou a été supprimé.</p><a href="residents.html" class="btn btn-accent">← Retour aux résidents</a></div>'; return; }
  document.getElementById('pageTitle').textContent = `${r.prenom||''} ${r.nom||''}`;
  document.getElementById('pageSub').textContent = 'Fiche résident';

  const editBtn = document.getElementById('btnEdit');
  if (editBtn) {
    if (!canEditResident()) { editBtn.style.display = 'none'; }
    else { editBtn.style.display = ''; editBtn.textContent = pageEditMode ? '✕ Annuler' : '✎ Modifier'; }
  }

  if (pageEditMode) { renderEditMode(r); return; }
  renderViewMode(r);
}

function renderViewMode(r) {
  const objs = DB.get(DB.keys.objectives) || [];
  const resObjs = (r.objectifs || []).map(id => objs.find(o => String(o.id) === String(id))).filter(Boolean);
  const type = getStructureType();
  const docs = (DB.get(DB.keys.documents)||{})[currentResidentId]||[];
  const genderLabel = r.genre==='M'?'Masculin':r.genre==='F'?'Féminin':'Autre';
  const todayPresences = (DB.get(DB.keys.presences)||{})[today()] || {};
  const presenceStatus = todayPresences[currentResidentId] || (r.statut === 'sorti' ? 'sorti' : r.statut);

  const photoEl = r.photo
    ? `<img src="${r.photo}" style="width:96px;height:96px;border-radius:12px;object-fit:cover;border:3px solid #fff;box-shadow:var(--shadow-md)" alt=""/>`
    : `<div style="width:96px;height:96px;border-radius:12px;background:${r.color||'var(--blue)'};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.8rem;color:#fff;box-shadow:var(--shadow-md)">${initials(r.prenom,r.nom)}</div>`;

  const infoRow = (label, value) => value ? `<div><div style="font-size:.68rem;font-weight:700;color:var(--muted);margin-bottom:2px">${label}</div><div style="font-weight:600;font-size:.85rem">${escHtml(value)}</div></div>` : '';

  const infoCard = (color, title, rows) => {
    const content = rows.filter(Boolean).join('');
    if (!content) return '';
    return `<div class="card" style="border-left:3px solid #${color}"><div class="card-body" style="display:flex;flex-direction:column;gap:.75rem"><div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#${color}">${title}</div><div class="grid grid-2" style="gap:.75rem">${content}</div></div></div>`;
  };

  const isEnfant = type === 'enfants' || type === 'mixte';
  const isAdulte = type === 'adultes' || type === 'mixte';

  document.getElementById('residentContent').innerHTML = `
    <div style="background:linear-gradient(135deg,${r.color||'var(--primary)'},${r.color||'var(--primary-dark)'}22);border-radius:var(--r);padding:2rem 2rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:center">
      ${photoEl}
      <div style="flex:1">
        <h1 style="font-size:1.8rem;font-weight:800;color:#fff;margin:0;text-shadow:0 1px 3px rgba(0,0,0,.15)">${escHtml(r.prenom||'')} ${escHtml(r.nom||'')}</h1>
        <div style="display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap">
          ${statusBadge(presenceStatus)}
          ${r.genre ? `<span class="badge" style="background:rgba(255,255,255,.2);color:#fff">${genderLabel}</span>` : ''}
          ${r.dob ? `<span class="badge" style="background:rgba(255,255,255,.2);color:#fff">${age(r.dob)} ans</span>` : ''}
        </div>
        ${r.referent ? `<div style="color:rgba(255,255,255,.8);font-size:.85rem;margin-top:.5rem">Référent : <strong style="color:#fff">${escHtml(r.referent)}</strong></div>` : ''}
      </div>
    </div>
    <div class="grid grid-4" style="margin-bottom:1.5rem">
      <div class="stat-card"><div class="stat-card-top"><span class="stat-label">Naissance</span><div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg></div></div><div class="stat-num" style="font-size:1rem">${r.dob ? formatDate(r.dob) : '—'}</div><div class="stat-change" style="font-size:.72rem">${r.dob ? age(r.dob)+' ans' : ''}</div></div>
      <div class="stat-card"><div class="stat-card-top"><span class="stat-label">Entrée</span><div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div></div><div class="stat-num" style="font-size:1rem">${r.entree ? formatDate(r.entree) : '—'}</div><div class="stat-change" style="font-size:.72rem">Date d'admission</div></div>
      <div class="stat-card"><div class="stat-card-top"><span class="stat-label">Chambre</span><div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div></div><div class="stat-num" style="font-size:1rem">${r.chambre||'—'}</div><div class="stat-change" style="font-size:.72rem">Espace de vie</div></div>
      <div class="stat-card"><div class="stat-card-top"><span class="stat-label">Genre</span><div class="stat-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></div></div><div class="stat-num" style="font-size:1rem">${genderLabel}</div><div class="stat-change" style="font-size:.72rem">${r.dob ? 'Né(e) le '+formatDate(r.dob) : ''}</div></div>
    </div>
    ${renderStatCards(r)}
    <div style="display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem">
      ${infoCard('0f2b4a', '👤 Identité', [
        infoRow('Nom', r.nom), infoRow('Prénom', r.prenom),
        infoRow('Genre', genderLabel), infoRow('Date de naissance', r.dob ? formatDate(r.dob)+' ('+age(r.dob)+' ans)' : ''),
        infoRow('N° Sécurité sociale', r.nss)
      ])}
      ${infoCard('d97706', '🏠 Séjour', [
        infoRow('Date d\'entrée', r.entree ? formatDate(r.entree) : ''),
        infoRow('Statut', r.statut), infoRow('Chambre / Unité', r.chambre),
        infoRow('Référent principal', r.referent)
      ])}
      ${infoCard('16a34a', '🏥 Médical', [
        infoRow('Médecin traitant', r.medecin), infoRow('Tél. médecin', r.medecinTel),
        infoRow('Allergies / Contre-indications', r.allergies)
      ])}
      ${isEnfant ? infoCard('8b5cf6', '🧒 Enfant', [
        infoRow('Tuteur légal', r.tuteur), infoRow('Tél. tuteur', r.tuteurTel),
        infoRow('Établissement scolaire', r.ecole), infoRow('Classe', r.classe),
        infoRow('Organisme', r.organisme), infoRow('N° dossier', r.dossier)
      ]) : ''}
      ${isAdulte ? infoCard('3b82f6', '👤 Adulte', [
        infoRow('Situation professionnelle', r.situationPro),
        infoRow('Ressources', r.ressources),
        infoRow('Organisme prescripteur', r.organismeA),
        infoRow('Situation administrative', r.situationAdmin)
      ]) : ''}
      ${resObjs.length ? infoCard('f59e0b', '🎯 Objectifs assignés ('+resObjs.length+')', resObjs.map(o => `<div style="grid-column:1/-1"><div style="padding:.6rem .85rem;background:var(--g50);border-radius:var(--r-sm);border:1px solid var(--border)"><div style="font-weight:600;font-size:.85rem">${escHtml(o.name)}</div>${o.description ? `<div style="font-size:.75rem;color:var(--muted);margin-top:2px">${escHtml(o.description)}</div>` : ''}</div></div>`)) : ''}
      ${r.notes ? infoCard('6366f1', '📝 Notes', [`<div style="grid-column:1/-1"><p style="white-space:pre-wrap;line-height:1.8;font-size:.875rem;margin:0">${escHtml(r.notes)}</p></div>`]) : ''}
      ${r.contacts ? infoCard('6366f1', '📞 Contacts d\'urgence', [`<div style="grid-column:1/-1"><p style="white-space:pre-wrap;line-height:1.8;font-size:.875rem;margin:0">${escHtml(r.contacts)}</p></div>`]) : ''}
    </div>
    <div style="display:flex;align-items:center;gap:.75rem;margin:1.5rem 0 1rem;padding:.5rem 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap">TABLEAU DE BORD DU RÉSIDENT</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    ${renderDataCards(r)}
    <div class="tabs" style="margin-bottom:1rem">
      <button class="tab active" data-tab="documents">📎 Documents ${docs.length ? `<span class="badge badge-gray" style="margin-left:.3rem">${docs.length}</span>` : ''}</button>
    </div>
    <div id="tab-documents">${docsHtml(docs)}</div>`;

  initPageDocUpload(currentResidentId);
}

function docsHtml(docs) {
  const list = docs.map(d => {
    const overdue = d.dueDate && d.dueDate < today() && !d.done;
    return `<div style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border)">
      <span style="font-size:1.3rem">${docTypeIcon(d.mimeType)}</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(d.name)}</div>
        <div style="font-size:.72rem;color:var(--muted);display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1px">
          <span>${DOC_CAT_LABELS[d.category]||d.category||'—'}</span>
          ${d.docDate ? `<span>📅 ${formatDate(d.docDate)}</span>` : ''}
          ${d.dueDate ? `<span style="color:${overdue ? '#ef4444' : 'inherit'}">⏰ ${formatDate(d.dueDate)}${overdue ? ' (Expiré)' : ''}</span>` : ''}
          <span>· ${fmtSize(d.size)}</span>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="downloadDoc('${d.id}','${currentResidentId}')">↓</button>
      <button class="btn btn-ghost btn-sm admin-only" style="color:var(--red)" onclick="deleteDocFromPage('${d.id}','${currentResidentId}')">✕</button>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-header"><span class="card-title">Fichiers joints</span></div><div class="card-body" style="padding:0">${docs.length ? list : '<div class="empty" style="padding:2rem"><p>Aucun document joint.</p></div>'}</div></div>
    <div class="card" style="margin-top:1rem">
      <div class="card-header"><span class="card-title">Ajouter un document</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:.85rem">
        <div class="form-group"><label>Nom du document</label><input type="text" id="pageDocName" class="form-input" placeholder="ex: Contrat de séjour"/></div>
        <div class="grid grid-2" style="gap:.75rem">
          <div class="form-group"><label>Date du document</label><input type="date" id="pageDocDate" class="form-input"/></div>
          <div class="form-group"><label>Date d'échéance</label><input type="date" id="pageDocDueDate" class="form-input"/></div>
        </div>
        <div class="form-group"><label>Catégorie</label><select id="pageDocCategory" class="form-input"><option value="">—</option><option value="administratif">Administratif</option><option value="medical">Médical</option><option value="scolaire">Scolaire</option><option value="judiciaire">Judiciaire</option><option value="contrat">Contrat</option><option value="autre">Autre</option></select></div>
        <div class="doc-upload-zone" onclick="document.getElementById('pageDocFileInput').click()" style="cursor:pointer;padding:1.5rem;text-align:center;border:2px dashed var(--border);border-radius:var(--r);background:var(--g50)">
          <div style="font-size:2rem;margin-bottom:.5rem">📎</div>
          <div style="font-weight:600;font-size:.875rem">Cliquez pour sélectionner un fichier</div>
          <div style="font-size:.78rem;color:var(--muted)">PDF, Word, image — max 3 Mo</div>
        </div>
        <input type="file" id="pageDocFileInput" style="display:none" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.gif,.webp"/>
        <div id="pageDocPending" style="display:none;padding:.75rem 1rem;border:1px solid var(--border);border-radius:var(--r-sm);display:flex;align-items:center;gap:.75rem">
          <span style="font-size:1.2rem">📎</span>
          <div style="flex:1;min-width:0">
            <div id="pageDocPendingName" style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
            <div id="pageDocPendingSize" style="font-size:.72rem;color:var(--muted)"></div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="cancelPageDoc()" style="color:var(--red)">✕</button>
        </div>
        <button class="btn btn-primary" onclick="uploadDocFromPage()" style="align-self:flex-end">Ajouter</button>
      </div>
    </div>`;
}

function inputField(id, label, value, type) {
  return `<div class="form-group"><label>${label}</label><input type="${type||'text'}" id="${id}" value="${escHtml(value||'')}" class="form-input"/></div>`;
}

function selectField(id, label, value, options) {
  const opts = options.map(o => `<option value="${o[0]}"${value===o[0]?' selected':''}>${o[1]}</option>`).join('');
  return `<div class="form-group"><label>${label}</label><select id="${id}" class="form-input">${opts}</select></div>`;
}

function renderEditMode(r) {
  const type = getStructureType();
  const objs = DB.get(DB.keys.objectives) || [];
  const resObjIds = r.objectifs || [];

  document.getElementById('residentContent').innerHTML = `
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-header"><span class="card-title">✎ Modification — ${escHtml(r.prenom||'')} ${escHtml(r.nom||'')}</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:1rem">
        <div class="grid grid-3" style="gap:.75rem">
          ${inputField('ePrenom','Prénom',r.prenom)}
          ${inputField('eNom','Nom',r.nom)}
          ${selectField('eGenre','Genre',r.genre, [['','—'],['M','Masculin'],['F','Féminin'],['A','Autre']])}
        </div>
        <div class="grid grid-3" style="gap:.75rem">
          ${inputField('eDob','Date de naissance',r.dob,'date')}
          ${inputField('eEntree','Date d\'entrée',r.entree,'date')}
          ${inputField('eChambre','Chambre / Unité',r.chambre)}
        </div>
        <div class="grid grid-3" style="gap:.75rem">
          ${selectField('eStatut','Statut',r.statut, [['present','Présent'],['absent','Absent'],['sortie','Sortie temp.'],['sorti','Sorti']])}
          ${inputField('eReferent','Référent',r.referent)}
          ${inputField('eColor','Couleur',r.color||'#3b82f6','color')}
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.25rem">👤 Informations personnelles</div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eMedecin','Médecin traitant',r.medecin)}
          ${inputField('eMedecinTel','Tél. médecin',r.medecinTel)}
          ${inputField('eAllergies','Allergies / CI',r.allergies)}
          ${inputField('eNss','N° Sécurité sociale',r.nss)}
        </div>
        ${(type==='enfants'||type==='mixte')?`
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8b5cf6;margin-bottom:.25rem">🧒 Enfant</div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eTuteur','Tuteur légal',r.tuteur)}
          ${inputField('eTuteurTel','Tél. tuteur',r.tuteurTel)}
          ${inputField('eEcole','Établissement scolaire',r.ecole)}
          ${inputField('eClasse','Classe',r.classe)}
          ${inputField('eOrganisme','Organisme',r.organisme)}
          ${inputField('eDossier','N° dossier',r.dossier)}
        </div>`:''}
        ${(type==='adultes'||type==='mixte')?`
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#3b82f6;margin-bottom:.25rem">👤 Adulte</div>
        <div class="grid grid-2" style="gap:.75rem">
          ${selectField('eSituationPro','Situation pro.',r.situationPro, [['','—'],['emploi','Emploi'],['chantier','Chantier éducatif'],['formation','Formation'],['stage','Stage'],['inactif','Inactif'],['retraite','Retraite'],['autre','Autre']])}
          ${selectField('eRessources','Ressources',r.ressources, [['','—'],['aaH','AAH'],['rsa','RSA'],['sans','Sans'],['autre','Autre']])}
          ${inputField('eOrganismeA','Organisme',r.organismeA)}
          ${inputField('eSituationAdmin','Situation admin.',r.situationAdmin)}
        </div>`:''}
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#f59e0b;margin-bottom:.25rem">🎯 Objectifs</div>
        <div id="eObjectifsList" style="display:flex;flex-wrap:wrap;gap:.4rem">${objs.map(o => `<label class="checkbox-wrap" style="padding:.4rem .65rem;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:background var(--t);user-select:none"><input type="checkbox" name="pageObj" value="${o.id}"${resObjIds.includes(o.id)?' checked':''}> ${escHtml(o.name)}</label>`).join('')}</div>
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6366f1;margin-bottom:.25rem">📝 Notes</div>
        <textarea id="eNotes" class="form-input" rows="4" style="resize:vertical">${escHtml(r.notes||'')}</textarea>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6366f1;margin-bottom:.25rem">📞 Contacts d'urgence</div>
        <textarea id="eContacts" class="form-input" rows="3" style="resize:vertical">${escHtml(r.contacts||'')}</textarea>
      </div>
      <div class="card-footer" style="display:flex;gap:.75rem;justify-content:flex-end;padding:.75rem 1rem">
        <button class="btn btn-ghost" onclick="cancelPageEdit()">Annuler</button>
        <button class="btn btn-primary" onclick="savePageEdit()">💾 Enregistrer</button>
      </div>
    </div>`;
}

function savePageEdit() {
  const r = getResident();
  if (!r) return;
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const checked = [...document.querySelectorAll('input[name="pageObj"]:checked')].map(el => el.value);
  const data = {
    ...r,
    prenom: g('ePrenom'), nom: g('eNom'), genre: g('eGenre'),
    dob: g('eDob'), entree: g('eEntree'), chambre: g('eChambre'),
    statut: g('eStatut'), referent: g('eReferent'), color: g('eColor') || '#3b82f6',
    medecin: g('eMedecin'), medecinTel: g('eMedecinTel'),
    allergies: g('eAllergies'), nss: g('eNss'),
    tuteur: g('eTuteur'), tuteurTel: g('eTuteurTel'), ecole: g('eEcole'),
    classe: g('eClasse'), organisme: g('eOrganisme'), dossier: g('eDossier'),
    situationPro: g('eSituationPro'), ressources: g('eRessources'),
    organismeA: g('eOrganismeA'), situationAdmin: g('eSituationAdmin'),
    objectifs: checked,
    notes: g('eNotes'), contacts: g('eContacts'),
    updatedAt: new Date().toISOString()
  };
  const residents = DB.get(DB.keys.residents) || [];
  DB.set(DB.keys.residents, residents.map(x => x.id === currentResidentId ? data : x));
  toast('Résident mis à jour', 'success');
  pageEditMode = false;
  loadResident();
}

function cancelPageEdit() {
  pageEditMode = false;
  loadResident();
}

function togglePageEdit() {
  pageEditMode = !pageEditMode;
  loadResident();
}

function renderDataCards(r) {
  const journal = DB.get(DB.keys.journal) || [];
  const planning = DB.get(DB.keys.planning) || [];
  const ppeList = DB.get(DB.keys.ppe) || [];
  const incidents = DB.get(DB.keys.incidents) || [];
  const categories = DB.get(DB.keys.categories) || [];
  const now = new Date();
  const rEvents = planning.filter(e => String(e.residentId) === String(currentResidentId) || e.residentName === `${r.prenom||''} ${r.nom||''}`);
  const upcomingEvents = rEvents.filter(e => { const start = new Date(e.date + 'T' + (e.time||'09:00')); return start.getTime() > now.getTime() - 3600000; }).sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||'')).slice(0,5);
  const rJournal = journal.filter(e => String(e.residentId) === String(currentResidentId) || e.resident === `${r.prenom||''} ${r.nom||''}`).slice(-5).reverse();
  const rIncidents = incidents.filter(e => String(e.residentId) === String(currentResidentId)).slice(-5).reverse();
  const rPpe = ppeList.filter(p => String(p.residentId) === String(currentResidentId) && p.statut !== 'termine');
  return `<div class="grid grid-2" style="gap:1.5rem;margin-bottom:1rem">
    <div class="card"><div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--accent)"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="card-title">Événements à venir</span><a href="planning.html" class="btn btn-ghost btn-sm" style="margin-left:auto">Voir tout</a></div><div class="card-body" style="padding:0">${upcomingEvents.length ? upcomingEvents.map(e => `<div style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border)"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.875rem">${escHtml(e.titre||'Événement')}</div><div style="font-size:.75rem;color:var(--muted)">${formatDate(e.date)} · ${e.time ? e.time.slice(0,5) : '—'}${e.timeEnd ? ' → '+e.timeEnd.slice(0,5) : ''}</div></div><span class="badge">${e.type||'—'}</span></div>`).join('') : '<div class="empty" style="padding:2rem"><p>Aucun événement planifié</p></div>'}</div></div>
    <div class="card"><div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--accent)"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="card-title">Journal de bord</span><a href="journal.html" class="btn btn-ghost btn-sm" style="margin-left:auto">Voir tout</a></div><div class="card-body" style="padding:0">${rJournal.length ? rJournal.map(e => { const cat = categories.find(c=>String(c.id)===String(e.categorie)); return `<div style="padding:.75rem 1.25rem;border-bottom:1px solid var(--border)"><div style="display:flex;align-items:center;gap:.5rem;margin-bottom:3px">${cat?`<span class="badge" style="background:${escHtml(cat.color)}22;color:${escHtml(cat.color)}">${escHtml(cat.name)}</span>`:''}<span style="font-size:.72rem;color:var(--muted)">${formatDateTime(e.date)}</span></div><div style="font-size:.8rem;color:var(--g700)">${escHtml(e.contenu||'')}</div></div>`; }).join('') : '<div class="empty" style="padding:2rem"><p>Aucune entrée journal</p></div>'}</div></div>
    <div class="card"><div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--accent)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span class="card-title">Avenants (PPE)</span><a href="ppe.html" class="btn btn-ghost btn-sm" style="margin-left:auto">Voir tout</a></div><div class="card-body" style="padding:0">${rPpe.length ? rPpe.map(p => { const totalObj = Object.values(p.sections||{}).reduce((a, s) => a + (s.objectifs?.length||0), 0); return `<div style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border)"><div style="flex:1;min-width:0;cursor:pointer" onclick="window.location='ppe.html?id=${p.id}'"><div style="font-weight:600;font-size:.875rem">${escHtml(p.dateRedaction||'?')}</div><div style="font-size:.75rem;color:var(--muted)">${totalObj} objectifs</div></div><span class="badge-ppe ${p.statut}">${STATUT_PPE_LABEL[p.statut]||p.statut}</span></div>`; }).join('') : '<div class="empty" style="padding:2rem"><p>Aucun avenant actif</p></div>'}</div></div>
    <div class="card"><div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--accent)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="card-title">Incidents récents</span><a href="incidents.html" class="btn btn-ghost btn-sm" style="margin-left:auto">Voir tout</a></div><div class="card-body" style="padding:0">${rIncidents.length ? rIncidents.map(e => `<div style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border)"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.875rem">${escHtml(e.type||'Incident')}</div><div style="font-size:.75rem;color:var(--muted)">${formatDate(e.date)} · ${escHtml(e.description||'').slice(0,80)}</div></div><span class="badge ${e.gravite === 'grave' ? 'badge-red' : e.gravite === 'modere' ? 'badge-amber' : 'badge-green'}">${e.gravite||'—'}</span></div>`).join('') : '<div class="empty" style="padding:2rem"><p>Aucun incident</p></div>'}</div></div>
  </div>`;
}

function renderStatCards(r) {
  const presences = DB.get(DB.keys.presences) || {};
  const journal = DB.get(DB.keys.journal) || [];
  const planning = DB.get(DB.keys.planning) || [];
  const ppeList = DB.get(DB.keys.ppe) || [];
  const incidents = DB.get(DB.keys.incidents) || [];
  const categories = DB.get(DB.keys.categories) || [];
  const now = new Date();
  const todayStr = today();
  const monthStart = todayStr.slice(0,7)+'-01';
  let monthAbsences = 0, monthTotal = 0;
  for (const [d,day] of Object.entries(presences)) {
    if (d < monthStart) continue;
    const s = day[currentResidentId];
    if (s) { monthTotal++; if (s === 'absent') monthAbsences++; }
  }
  const rEvents = planning.filter(e => String(e.residentId) === String(currentResidentId) || e.residentName === `${r.prenom||''} ${r.nom||''}`);
  const upcomingEvents = rEvents.filter(e => { const start = new Date(e.date + 'T' + (e.time||'09:00')); return start.getTime() > now.getTime() - 3600000; }).sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||'')).slice(0,5);
  const rJournal = journal.filter(e => String(e.residentId) === String(currentResidentId) || e.resident === `${r.prenom||''} ${r.nom||''}`).slice(-5).reverse();
  const rIncidents = incidents.filter(e => String(e.residentId) === String(currentResidentId)).slice(-5).reverse();
  const rPpe = ppeList.filter(p => String(p.residentId) === String(currentResidentId) && p.statut !== 'termine');
  const docCount = ((DB.get(DB.keys.documents)||{})[currentResidentId]||[]).length;
  return `
    <div class="grid grid-4" style="margin-bottom:1.5rem">
      <div class="stat-card"><div class="stat-card-top"><span class="stat-label">Absences (mois)</span><div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div></div><div class="stat-num">${monthAbsences}</div><div class="stat-change">${monthTotal ? Math.round(monthAbsences/monthTotal*100)+'%' : '—'}</div></div>
      <div class="stat-card"><div class="stat-card-top"><span class="stat-label">Événements à venir</span><div class="stat-icon" style="background:#fef3f2;color:#ef4444"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div></div><div class="stat-num">${upcomingEvents.length}</div><div class="stat-change">Sur le planning</div></div>
      <div class="stat-card"><div class="stat-card-top"><span class="stat-label">Avenants actifs</span><div class="stat-icon" style="background:#f0fdf4;color:#16a34a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg></div></div><div class="stat-num">${rPpe.length}</div><div class="stat-change">${rPpe.length ? (rPpe.filter(p=>p.statut==='actif').length)+' en cours' : 'Aucun'}</div></div>
      <a href="documents.html?residentId=${currentResidentId}" class="stat-card" style="cursor:pointer;text-decoration:none;color:inherit;display:block"><div class="stat-card-top"><span class="stat-label">Documents</span><div class="stat-icon" style="background:#eef2ff;color:#6366f1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div></div><div class="stat-num">${docCount}</div><div class="stat-change">Fichiers attachés</div></a>
    </div>`;
}

function initPageTabs() {
  document.querySelectorAll('#residentContent .tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('#residentContent .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.querySelectorAll('#residentContent > [id^="tab-"]').forEach(x => x.style.display = 'none');
      const tab = document.getElementById('tab-' + t.dataset.tab);
      if (tab) tab.style.display = '';
    });
  });
}

let pageDocFile = null;

function initPageDocUpload(residentId) {
  const input = document.getElementById('pageDocFileInput');
  if (!input) return;
  input.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { toast('Fichier trop lourd (max 3 Mo)', 'error'); return; }
    pageDocFile = file;
    document.getElementById('pageDocPendingName').textContent = file.name;
    document.getElementById('pageDocPendingSize').textContent = fmtSize(file.size);
    document.getElementById('pageDocPending').style.display = 'flex';
  });
}

async function uploadDocFromPage() {
  if (!pageDocFile || !currentResidentId) return;
  const name = document.getElementById('pageDocName').value.trim() || pageDocFile.name.replace(/\.[^.]+$/, '');
  const docDate = document.getElementById('pageDocDate').value;
  const dueDate = document.getElementById('pageDocDueDate').value;
  const category = document.getElementById('pageDocCategory').value;
  try {
    const base64 = await fileToBase64(pageDocFile);
    const doc = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name,
      fileName: pageDocFile.name,
      size: pageDocFile.size,
      mimeType: pageDocFile.type,
      category,
      docDate,
      dueDate,
      date: new Date().toISOString(),
      data: base64
    };
    const allDocs = DB.get(DB.keys.documents) || {};
    if (!allDocs[currentResidentId]) allDocs[currentResidentId] = [];
    allDocs[currentResidentId].push(doc);
    DB.set(DB.keys.documents, allDocs);
    toast('Document ajouté', 'success');
    pageDocFile = null;
    document.getElementById('pageDocName').value = '';
    document.getElementById('pageDocDate').value = '';
    document.getElementById('pageDocDueDate').value = '';
    document.getElementById('pageDocCategory').value = '';
    document.getElementById('pageDocFileInput').value = '';
    document.getElementById('pageDocPending').style.display = 'none';
    loadResident();
  } catch { toast('Erreur lors de l\'ajout', 'error'); }
}

function cancelPageDoc() {
  pageDocFile = null;
  document.getElementById('pageDocFileInput').value = '';
  document.getElementById('pageDocPending').style.display = 'none';
}

function deleteDocFromPage(docId, resId) {
  if (!confirm('Supprimer ce document ?')) return;
  const allDocs = DB.get(DB.keys.documents) || {};
  if (!allDocs[resId]) return;
  allDocs[resId] = allDocs[resId].filter(d => d.id !== docId);
  if (!allDocs[resId].length) delete allDocs[resId];
  DB.set(DB.keys.documents, allDocs);
  toast('Document supprimé', 'success');
  loadResident();
}

document.addEventListener('DOMContentLoaded', () => {
  loadResident();
});
</script>
