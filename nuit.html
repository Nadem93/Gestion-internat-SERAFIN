<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cahier de nuit — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Cahier de nuit & astreinte</div></div>
      <div class="header-right">
        <a href="journal.html" class="btn btn-outline btn-sm">📔 Journal de bord</a>
        <a href="accueil.html" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    </header>

    <main class="content" style="max-width:1080px">
      <div class="toolbar" style="margin-bottom:1.25rem;align-items:center">
        <button class="btn btn-ghost btn-icon" onclick="nuitShift(-1)" title="Nuit précédente"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><polyline points="15 18 9 12 15 6"/></svg></button>
        <input type="date" id="ntDate" style="width:auto"/>
        <button class="btn btn-ghost btn-icon" onclick="nuitShift(1)" title="Nuit suivante"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><polyline points="9 18 15 12 9 6"/></svg></button>
        <span id="ntLabel" style="font-weight:700;color:var(--primary)"></span>
      </div>

      <div id="ntBody"></div>

      <div class="section-label" style="margin:1.75rem 0 .75rem">🗂 Nuits précédentes</div>
      <div id="ntHisto" style="display:flex;flex-direction:column;gap:.5rem"></div>
    </main>
  </div>
</div>

<!-- MODAL ÉVÉNEMENT DE NUIT -->
<div class="modal-overlay" id="modalNuitEvt">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚡ Événement de la nuit</span>
      <button class="modal-close" onclick="closeModal('modalNuitEvt')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Type</label><select id="neType">
          <option value="reveil">😴 Réveil / insomnie</option>
          <option value="angoisse">😰 Angoisse / crise</option>
          <option value="soin">🩺 Soin / santé</option>
          <option value="conflit">⚡ Conflit / agitation</option>
          <option value="fugue">🚨 Absence / fugue</option>
          <option value="retour">🌙 Retour tardif</option>
          <option value="autre">📌 Autre</option>
        </select></div>
        <div class="form-group"><label>Heure</label><input type="time" id="neHeure"/></div>
      </div>
      <div class="form-group"><label>Résident concerné</label><select id="neResident"></select></div>
      <div class="form-group"><label class="required">Description</label><textarea id="neDesc" rows="3" placeholder="Ce qui s'est passé, ce qui a été fait…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalNuitEvt')">Annuler</button>
      <button class="btn btn-primary" onclick="saveNuitEvt()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/nuit.js"></script>
</body>
</html>
