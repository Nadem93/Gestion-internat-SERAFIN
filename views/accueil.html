<script>
if (Auth.getSession()?.role !== 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
function updateNotifs() {
  const session = Auth.getSession();
  if (!session) return;
  const userName = [session.prenom, session.nom].filter(Boolean).join(' ') || session.username;
  const uid = String(session.userId);
  const messages = DB.get(DB.keys.messages) || [];
  let changed = false;
  messages.forEach(m => {
    if (!Array.isArray(m.readBy)) { m.readBy = []; changed = true; }
  });
  if (changed) DB.set(DB.keys.messages, messages);
  const convs = JSON.parse(localStorage.getItem('ftr_conversations') || '{}');
  const myConvIds = Object.values(convs).filter(c => c.userIds.map(String).includes(uid)).map(c => c.id);
  const unreadMsgs = messages.filter(m => Array.isArray(m.readBy) && myConvIds.includes(m.convId) && !m.readBy.map(String).includes(uid) && String(m.from) !== uid).length;
  const journal = DB.get(DB.keys.journal) || [];
  const unreadJournal = journal.filter(e => Array.isArray(e.readBy) && !e.readBy.includes(session.userId)).length;
  const lastPpe = localStorage.getItem('ftr_last_visit_ppe_' + session.userId);
  const ppe = DB.get(DB.keys.ppe) || [];
  const newPpe = ppe.filter(e => e.createdBy !== userName && (!lastPpe || new Date(e.createdAt).getTime() > Number(lastPpe))).length;
  const lastInc = localStorage.getItem('ftr_last_visit_incidents_' + session.userId);
  const incidents = DB.get(DB.keys.incidents) || [];
  const newIncidents = lastInc === null ? 0 : incidents.filter(e => e.statut !== 'classe' && new Date(e.createdAt).getTime() > Number(lastInc)).length;
  const lastInt = localStorage.getItem('ftr_last_visit_interventions_' + session.userId);
  const interventions = DB.get(DB.keys.interventions) || [];
  const newInt = lastInt === null ? 0 : interventions.filter(e => e.statut === 'ouverte' && new Date(e.date).getTime() > Number(lastInt)).length;

  const counts = { messages: unreadMsgs, journal: unreadJournal, ppe: newPpe, incidents: newIncidents, interventions: newInt };
  document.querySelectorAll('[data-module]').forEach(el => {
    const mod = el.dataset.module;
    let badge = el.querySelector('.notif-badge');
    const c = counts[mod] || 0;
    if (c > 0) {
      if (!badge) {
        badge = document.createElement('span');
        badge.className = 'notif-badge';
        el.appendChild(badge);
      }
      badge.textContent = c > 99 ? '99+' : c;
      badge.classList.remove('hidden');
    } else {
      if (badge) badge.remove();
    }
  });
}
updateNotifs();
document.addEventListener('visibilitychange', () => { if (!document.hidden) updateNotifs(); });
window.addEventListener('focus', updateNotifs);
window.addEventListener('pageshow', updateNotifs);
window.addEventListener('storage', e => {
  if (e.key === DB.keys.messages || e.key === DB.keys.journal || e.key === DB.keys.ppe || e.key === DB.keys.incidents || e.key === DB.keys.interventions) updateNotifs();
});
  if (window._notifInterval) clearInterval(window._notifInterval);
window._notifInterval = setInterval(updateNotifs, 10000);

function loadChambres() {
  const r = DB.get(DB.keys.residents) || [];
  const chambres = [...new Set(r.map(x => x.chambre).filter(Boolean))].sort();
  const dl = document.getElementById('chambresList');
  if (dl) dl.innerHTML = chambres.map(c => `<option value="${c}">`).join('');
}
function saveIntervention() {
  const lieu = document.getElementById('intLieu').value.trim();
  const desc = document.getElementById('intDesc').value.trim();
  const urgence = document.getElementById('intUrgence').value;
  if (!lieu || !desc) { alert('Veuillez remplir le lieu et la description.'); return; }
  const list = DB.get(DB.keys.interventions) || [];
  list.push({ id: Date.now(), lieu, desc, urgence, date: new Date().toISOString(), statut: 'ouverte' });
  DB.set(DB.keys.interventions, list);
  closeModal('modalIntervention');
  document.getElementById('intLieu').value = '';
  document.getElementById('intDesc').value = '';
  document.getElementById('intUrgence').value = 'normale';
  alert('Demande d\'intervention envoyée ✓');
}
loadChambres();
</script>

<div class="modal-overlay" id="modalIntervention" onclick="closeModal('modalIntervention')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">🔧 Demande d'intervention</span>
      <button class="modal-close" onclick="closeModal('modalIntervention')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Chambre / Lieu</label>
        <input type="text" id="intLieu" class="form-control" placeholder="Ex: Chambre 12, Salle commune…" list="chambresList"/>
        <datalist id="chambresList"></datalist>
      </div>
      <div class="form-group">
        <label>Description du problème</label>
        <textarea id="intDesc" class="form-control" rows="4" placeholder="Décrivez le problème à résoudre…"></textarea>
      </div>
      <div class="form-group">
        <label>Urgence</label>
        <select id="intUrgence" class="form-control">
          <option value="basse">Basse</option>
          <option value="normale" selected>Normale</option>
          <option value="haute">Haute</option>
          <option value="critique">Critique</option>
      </select>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-ghost" onclick="closeModal('modalIntervention')">Annuler</button>
    <button class="btn btn-accent" onclick="saveIntervention()">Envoyer la demande</button>
  </div>
</div>

<div class="modal-overlay" id="modalVehiculeAccueil" onclick="closeModal('modalVehiculeAccueil')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">🚗 Réserver un véhicule</span>
      <button class="modal-close" onclick="closeModal('modalVehiculeAccueil')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Date & heure de départ</label><input type="datetime-local" id="mvDateAllerA" class="form-control"/></div>
        <div class="form-group"><label>Durée</label>
          <select id="mvDureeA" class="form-control">
            <option value="30">30 min</option><option value="60" selected>1 h</option><option value="90">1 h 30</option>
            <option value="120">2 h</option><option value="180">3 h</option><option value="240">4 h</option>
            <option value="360">6 h</option><option value="480">8 h</option><option value="journee">Journée</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Véhicule</label><input type="text" id="mvVehiculeA" class="form-control" list="mvVehiculesListA" placeholder="Sélectionner ou saisir"/><datalist id="mvVehiculesListA"></datalist></div>
      <div class="form-group"><label>Destination</label><input type="text" id="mvDestinationA" class="form-control" placeholder="Lieu de destination"/></div>
      <div class="form-group"><label>Motif (optionnel)</label><input type="text" id="mvMotifA" class="form-control" placeholder="Objet du déplacement"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalVehiculeAccueil')">Annuler</button>
      <button class="btn btn-accent" onclick="reserverVehiculeAccueil()">Confirmer</button>
    </div>
  </div>
</div>

<script>
function loadVehiculesAccueil() {
  const v = DB.get(DB.keys.vehicules) || ['Renault Kangoo','Citroën Berlingo','Peugeot Partner','Volkswagen Caddy'];
  const dl = document.getElementById('mvVehiculesListA');
  if (dl) dl.innerHTML = v.map(x => '<option value="' + escHtml(x) + '">').join('');
}
function reserverVehiculeAccueil() {
  const dateAller = document.getElementById('mvDateAllerA').value;
  const dureeVal = document.getElementById('mvDureeA').value;
  const vehicule = document.getElementById('mvVehiculeA').value.trim();
  const destination = document.getElementById('mvDestinationA').value.trim();
  const motif = document.getElementById('mvMotifA').value.trim();
  if (!dateAller || !vehicule || !destination) { alert('Veuillez remplir la date, le véhicule et la destination.'); return; }
  let dateRetour;
  if (dureeVal === 'journee') { const d = new Date(dateAller); dateRetour = d.toISOString().slice(0,10) + 'T23:59'; }
  else { const d = new Date(new Date(dateAller).getTime() + parseInt(dureeVal) * 60000); dateRetour = d.toISOString().slice(0,16); }
  const allPlan = DB.get(DB.keys.planning) || [];
  const conflit = allPlan.some(e => {
    if (e.type !== 'vehicule' || e.vehicule !== vehicule) return false;
    const s = new Date(e.date + 'T' + (e.time || '00:00'));
    const en = new Date(e.dateEnd + 'T' + (e.timeEnd || '23:59'));
    const dA = new Date(dateAller), dR = new Date(dateRetour);
    return dA < en && dR > s;
  });
  if (conflit) { alert('❌ ' + vehicule + ' déjà réservé pour cette période.'); return; }
  const session = Auth.getSession();
  const prenom = session?.prenom || '';
  const nom = session?.nom || '';
  const userName = [prenom, nom].filter(Boolean).join(' ') || session?.username || 'Inconnu';
  const planning = DB.get(DB.keys.planning) || [];
  planning.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    titre: 'Véhicule — ' + vehicule,
    date: dateAller.slice(0,10), dateEnd: dateRetour.slice(0,10),
    time: dateAller.slice(11,16), timeEnd: dateRetour.slice(11,16),
    desc: 'Réservé par : ' + userName + (motif ? '\nMotif : ' + motif : '') + '\nVéhicule : ' + vehicule + '\nDestination : ' + destination,
    color: '#6366f1', type: 'vehicule', vehicule, destination, reservedBy: userName, reservedPrenom: prenom
  });
  DB.set(DB.keys.planning, planning);
  closeModal('modalVehiculeAccueil');
  document.getElementById('mvDateAllerA').value = '';
  document.getElementById('mvVehiculeA').value = '';
  document.getElementById('mvDestinationA').value = '';
  document.getElementById('mvMotifA').value = '';
  alert('🚗 ' + vehicule + ' réservé par ' + (prenom || userName) + ' vers ' + destination);
}
loadVehiculesAccueil();
</script>
</div>
