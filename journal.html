<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Journal de bord — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo"><img class="sidebar-logo-img" src="" style="display:none" alt="Logo"/><div class="logo-icon">FTR</div><div class="logo-text"><span id="sidebarEtab">Foyer Trois Rivières</span><strong>Administration</strong></div></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Principal</div>
      <a href="dashboard.html" class="nav-item" data-page="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Tableau de bord</a>
      <a href="residents.html" class="nav-item" data-page="residents.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Résidents</a>
      <a href="journal.html" class="nav-item" data-page="journal.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Journal de bord</a>
      <a href="planning.html" class="nav-item" data-page="planning.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Planning</a>
      <a href="presences.html" class="nav-item" data-page="presences.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Présences</a>
    </div>
    <div class="sidebar-section"><div class="sidebar-label">Paramètres</div><a href="admin.html" class="nav-item admin-only" data-page="admin.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/></svg>Administration</a></div>
    <div class="sidebar-footer">
      <div class="user-card"><div class="avatar" id="sidebarAvatar">A</div><div><div class="user-name" id="sidebarUserName">Administrateur</div><div class="user-role" id="sidebarUserRole">Admin</div></div></div>
      <a href="#" onclick="Auth.logout()" class="nav-item" style="margin-top:.25rem;color:rgba(255,255,255,.4)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Déconnexion</a>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <div><div class="header-title">Journal de bord</div><div class="header-sub">Suivez les événements quotidiens</div></div>
      <div class="header-right">
        <button class="btn btn-accent" onclick="openModal('modalEntry')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvelle entrée
        </button>
      </div>
    </header>

    <main class="content">
      <div class="toolbar" style="margin-bottom:1.5rem">
        <div class="search-box">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="jSearch" placeholder="Rechercher…"/>
        </div>
        <select id="jFilterResident" style="width:auto"><option value="">Tous les résidents</option></select>
        <select id="jFilterCat" style="width:auto"><option value="">Toutes les catégories</option></select>
        <input type="date" id="jFilterDate" style="width:auto"/>
      </div>

      <div style="display:grid;grid-template-columns:360px 1fr;gap:1.5rem;align-items:start">
        <div>
          <div id="journalCount" style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem"></div>
          <div id="entriesList" style="display:flex;flex-direction:column;gap:.75rem"></div>
        </div>
        <div id="entryDetail" style="position:sticky;top:calc(var(--header-h) + 1.5rem)">
          <div class="entry-detail" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--muted)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;margin-bottom:1rem;opacity:.3"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <p style="font-size:.875rem">Sélectionnez une entrée pour la lire</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL NOUVELLE ENTRÉE -->
<div class="modal-overlay" id="modalEntry">
  <div class="modal lg">
    <div class="modal-header">
      <span class="modal-title" id="modalEntryTitle">Nouvelle entrée</span>
      <button class="modal-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="entryId"/>
      <div class="form-row">
        <div class="form-group"><label class="required">Résident concerné</label><select id="eResident"><option value="">— Sélectionner —</option></select></div>
        <div class="form-group"><label class="required">Catégorie</label><select id="eCategorie"><option value="">— Sélectionner —</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date et heure</label><input type="datetime-local" id="eDate"/></div>
        <div class="form-group"><label>Objectif lié</label><select id="eObjectif"><option value="">— Aucun —</option></select></div>
      </div>
      <div class="form-group"><label class="required">Contenu</label><textarea id="eContenu" rows="6" placeholder="Décrivez l'événement, l'observation ou l'intervention…"></textarea></div>
      <div class="form-group">
        <label>Visibilité</label>
        <div style="display:flex;gap:1rem">
          <label class="checkbox-wrap"><input type="radio" name="eVisibilite" value="equipe" checked/> Équipe uniquement</label>
          <label class="checkbox-wrap"><input type="radio" name="eVisibilite" value="tous"/> Tous</label>
          <label class="checkbox-wrap"><input type="radio" name="eVisibilite" value="confidentiel"/> Confidentiel</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeAllModals()">Annuler</button>
      <button class="btn btn-danger btn-sm" id="btnDeleteEntry" style="margin-right:auto;display:none" onclick="deleteEntry()">Supprimer</button>
      <button class="btn btn-primary" onclick="saveEntry()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script src="js/journal.js"></script>
</body>
</html>
