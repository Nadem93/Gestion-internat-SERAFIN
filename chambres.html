<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chambres — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Plan des chambres</div></div>
      <div class="header-right">
        <button id="btnAddChambre" class="btn btn-accent btn-sm btn-add-resident" onclick="openChambreModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-add-label">Nouvelle chambre</span>
        </button>
        <a href="accueil.html" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    </header>

    <main class="content">
      <div id="chStats" class="grid grid-4" style="margin-bottom:1.5rem"></div>
      <div id="chGrid" class="grid" style="gap:0"></div>
    </main>
  </div>
</div>

<!-- MODAL CHAMBRE -->
<div class="modal-overlay" id="modalChambre">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="chModalTitle">Nouvelle chambre</span>
      <button class="modal-close" onclick="closeModal('modalChambre')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="required">Numéro / nom</label><input type="text" id="chNom" placeholder="Ex : 12, A3…"/></div>
        <div class="form-group"><label>Unité / étage</label><input type="text" id="chUnite" placeholder="Ex : Rez-de-chaussée, Unité B…"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Capacité (lits)</label><input type="number" id="chCapacite" min="1" max="10" value="1"/></div>
        <div class="form-group"><label>Notes</label><input type="text" id="chNotes" placeholder="PMR, proche sanitaires…"/></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalChambre')">Annuler</button>
      <button class="btn btn-primary" onclick="saveChambre()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL ATTRIBUTION -->
<div class="modal-overlay" id="modalAssign">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="asTitle">Attribuer un lit</span>
      <button class="modal-close" onclick="closeModal('modalAssign')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Occupants actuels</label>
        <div id="asOccupants" style="display:flex;flex-direction:column;gap:.4rem"></div>
      </div>
      <div class="form-group">
        <label>Ajouter un résident</label>
        <div style="display:flex;gap:.5rem">
          <select id="asResident" style="flex:1"></select>
          <button class="btn btn-accent" onclick="assignResident()">Attribuer</button>
        </div>
        <span class="form-hint">Le champ « chambre » de la fiche résident est mis à jour automatiquement.</span>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ÉTATS DES LIEUX -->
<div class="modal-overlay" id="modalEdl">
  <div class="modal lg">
    <div class="modal-header">
      <span class="modal-title" id="edlTitle">États des lieux</span>
      <button class="modal-close" onclick="closeModal('modalEdl')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="section-label">Nouvel état des lieux</div>
      <div class="form-row-3">
        <div class="form-group"><label>Type</label><select id="edlType"><option value="entree">Entrée</option><option value="sortie">Sortie</option></select></div>
        <div class="form-group"><label>Date</label><input type="date" id="edlDate"/></div>
        <div class="form-group"><label>Résident</label><select id="edlResident"></select></div>
      </div>
      <div id="edlItems" style="display:flex;flex-direction:column;gap:.45rem"></div>
      <div class="form-group"><label>Observations</label><textarea id="edlObs" rows="2" placeholder="Dégradations constatées, mobilier manquant…"></textarea></div>
      <div style="text-align:right"><button class="btn btn-primary btn-sm" onclick="saveEdlEntry()">💾 Enregistrer l'état des lieux</button></div>
      <div class="divider"></div>
      <div class="section-label">Historique</div>
      <div id="edlHistory" style="display:flex;flex-direction:column;gap:.45rem"></div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/chambres.js"></script>
</body>
</html>
