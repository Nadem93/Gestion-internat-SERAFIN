<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Échéancier — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Échéancier administratif</div></div>
      <div class="header-right">
        <button id="btnAddEcheance" class="btn btn-accent btn-sm btn-add-resident" onclick="openEcheanceModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-add-label">Nouvelle échéance</span>
        </button>
        <a href="accueil.html" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    </header>

    <main class="content" style="max-width:980px">
      <div id="ecStats" class="grid grid-4" style="margin-bottom:1.5rem"></div>

      <div class="toolbar" style="margin-bottom:1.25rem">
        <select id="ecFilterResident" style="width:auto"></select>
        <select id="ecFilterType" style="width:auto"></select>
        <label class="checkbox-wrap" style="margin-left:auto;font-size:.8rem;display:flex;align-items:center;gap:.4rem;text-transform:none;letter-spacing:0">
          <input type="checkbox" id="ecShowDone" style="width:auto"/> Afficher les échéances traitées
        </label>
      </div>

      <div id="ecList" style="display:flex;flex-direction:column;gap:.6rem"></div>
    </main>
  </div>
</div>

<!-- MODAL ÉCHÉANCE -->
<div class="modal-overlay" id="modalEcheance">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="ecModalTitle">Nouvelle échéance</span>
      <button class="modal-close" onclick="closeModal('modalEcheance')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Type</label><select id="ecType"></select></div>
        <div class="form-group"><label class="required">Date d'échéance</label><input type="date" id="ecDate"/></div>
      </div>
      <div class="form-group"><label>Libellé</label><input type="text" id="ecLibelle" placeholder="Ex : Renouvellement notification MDPH"/></div>
      <div class="form-group"><label>Résident concerné</label><select id="ecResident"></select></div>
      <div class="form-group"><label>Notes</label><textarea id="ecNotes" rows="2" placeholder="Démarches à engager, contact, référence dossier…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalEcheance')">Annuler</button>
      <button class="btn btn-primary" onclick="saveEcheance()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/echeances.js"></script>
</body>
</html>
