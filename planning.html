<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planning — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a href="dashboard.html" class="sidebar-logo"><img class="sidebar-logo-img" src="" style="display:none" alt="Logo"/><div class="logo-icon">FTR</div><div class="logo-text"><span id="sidebarEtab">Foyer Trois Rivières</span><strong>Administration</strong></div></a>
    <div class="sidebar-section">
      <div class="sidebar-label">Principal</div>
      <a href="dashboard.html" class="nav-item" data-page="dashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Tableau de bord</a>
      <a href="residents.html" class="nav-item" data-page="residents.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Résidents</a>
      <a href="journal.html" class="nav-item" data-page="journal.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Journal de bord</a>
      <a href="planning.html" class="nav-item" data-page="planning.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Planning</a>
      <a href="presences.html" class="nav-item" data-page="presences.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Présences</a>
    </div>
    <div class="sidebar-section"><div class="sidebar-label">Paramètres</div><a href="admin.html" class="nav-item admin-only" data-page="admin.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/></svg>Administration</a></div>
    <div class="sidebar-footer">
      <div class="user-card"><div class="avatar" id="sidebarAvatar">A</div><div><div class="user-name" id="sidebarUserName">Administrateur</div><div class="user-role" id="sidebarUserRole">Admin</div></div></div>
      <a href="#" onclick="Auth.logout()" class="nav-item" style="margin-top:.25rem;color:rgba(255,255,255,.4)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Déconnexion</a>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <div><div class="header-title">Planning</div><div class="header-sub">Gestion des activités et événements</div></div>
      <div class="header-right">
        <div style="display:flex;gap:.4rem;background:var(--g100);border-radius:var(--r-sm);padding:3px">
          <button class="btn btn-sm" id="viewWeek" style="background:#fff;box-shadow:var(--shadow-sm)">Semaine</button>
          <button class="btn btn-ghost btn-sm" id="viewMonth">Mois</button>
          <button class="btn btn-ghost btn-sm" id="viewList">Liste</button>
        </div>
        <button class="btn btn-accent" onclick="openModal('modalEvent')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvel événement
        </button>
      </div>
    </header>

    <main class="content">
      <!-- Nav calendrier -->
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
        <button class="btn btn-outline btn-sm" id="prevBtn">&#8592;</button>
        <h2 id="calTitle" style="font-size:1.1rem;font-weight:700;min-width:220px;text-align:center"></h2>
        <button class="btn btn-outline btn-sm" id="nextBtn">&#8594;</button>
        <button class="btn btn-ghost btn-sm" id="todayBtn">Aujourd'hui</button>
        <select id="filterEventResident" style="width:auto;margin-left:auto"><option value="">Tous les résidents</option></select>
      </div>

      <div id="calContainer"></div>

      <!-- Vue liste -->
      <div id="listContainer" style="display:none">
        <div class="table-wrap">
          <table><thead><tr><th>Titre</th><th>Résident</th><th>Date</th><th>Heure</th><th>Type</th><th>Actions</th></tr></thead>
          <tbody id="eventTableBody"></tbody></table>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL ÉVÉNEMENT -->
<div class="modal-overlay" id="modalEvent">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalEventTitle">Nouvel événement</span>
      <button class="modal-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eventId"/>
      <div class="form-group"><label class="required">Titre</label><input type="text" id="evTitre" placeholder="Titre de l'événement"/></div>
      <div class="form-row">
        <div class="form-group"><label>Résident</label><select id="evResident"><option value="">Tous / Groupe</option></select></div>
        <div class="form-group"><label>Type</label><select id="evType"><option value="activite">Activité</option><option value="rdv">Rendez-vous</option><option value="sortie">Sortie</option><option value="reunion">Réunion</option><option value="autre">Autre</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="required">Date</label><input type="date" id="evDate"/></div>
        <div class="form-group"><label>Heure de début</label><input type="time" id="evHeure" value="09:00"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Durée</label><select id="evDuree"><option value="30">30 min</option><option value="60" selected>1h</option><option value="90">1h30</option><option value="120">2h</option><option value="180">3h</option><option value="journee">Journée</option></select></div>
        <div class="form-group"><label>Couleur</label><input type="color" id="evColor" value="#3b82f6"/></div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="evDesc" rows="3" placeholder="Détails, lieu, intervenants…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeAllModals()">Annuler</button>
      <button class="btn btn-danger btn-sm" id="btnDeleteEvent" style="margin-right:auto;display:none" onclick="deleteEvent()">Supprimer</button>
      <button class="btn btn-primary" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script src="js/planning.js"></script>
</body>
</html>
